name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent inactivity pause
        run: |
          curl -s -o /dev/null -w ${{ secrets.SUPABASE_URL }} \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            ${{ secrets.SUPABASE_URL }}/rest/v1/
